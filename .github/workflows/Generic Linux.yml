name: Build Linux

on:
  workflow_dispatch:

jobs:
  build:
    name: Generic Linux (${{ matrix.arch_out }})
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch_out: amd64
            runs_on: ubuntu-24.04
          - arch_out: arm64
            runs_on: ubuntu-24.04-arm
    env:
      CCACHE_SIZE: 3G
      CCACHE_DIR: ${{ github.workspace }}/ccache

    steps:
      - name: Clone from GitLab
        shell: bash
        run: |
          set -euo pipefail
          git clone --branch XBOX-Overhaul --depth 1 \
            https://gitlab.com/ilikegothmommys/openmw-xbox.git src

      - name: Restore caches
        uses: actions/cache@v5
        with:
          path: |
            ccache
            src/apt-cache
          key: linux-${{ matrix.arch_out }}-${{ github.sha }}
          restore-keys: |
            linux-${{ matrix.arch_out }}-

      - name: Install dependencies
        shell: bash
        working-directory: src
        run: |
          set -euo pipefail
          export APT_CACHE_DIR="$PWD/apt-cache"
          export DEBIAN_FRONTEND=noninteractive
          mkdir -p "$APT_CACHE_DIR"

          sudo apt-get update -yqq
          sudo apt-get -y --no-install-recommends install software-properties-common gnupg
          sudo add-apt-repository -y ppa:openmw/openmw
          sudo add-apt-repository -y ppa:openmw/openmw-daily
          sudo add-apt-repository -y ppa:openmw/staging
          sudo apt-get update -yqq

          sudo apt-get -qq -o dir::cache::archives="$APT_CACHE_DIR" install -y --no-install-recommends \
            binutils build-essential clang cmake curl gcc git libclang-dev mold ninja-build python3-clang python3-pip unzip \
            ccache pkg-config \
            libboost-program-options-dev libboost-system-dev libboost-iostreams-dev \
            libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libswresample-dev \
            libsdl2-dev libqt6opengl6-dev qt6-tools-dev qt6-tools-dev-tools libopenal-dev \
            libunshield-dev libtinyxml-dev libbullet-dev liblz4-dev libpng-dev libjpeg-dev \
            libluajit-5.1-dev librecast-dev libsqlite3-dev ca-certificates libicu-dev \
            libyaml-cpp-dev libqt6svg6 libqt6svg6-dev \
            libmygui-dev libopenscenegraph-dev libcollada-dom-dev
          sudo apt list --installed

      - name: Build & Package
        shell: bash
        working-directory: src
        env:
          ARCH_OUT: ${{ matrix.arch_out }}
          CCACHE_BASEDIR: ${{ github.workspace }}/src
          CCACHE_DIR: ${{ github.workspace }}/ccache
        run: |
          set -euo pipefail

          DATE=$(date -u +%Y-%m-%d)
          ROOT="$(pwd)"
          BUILD_DIR="${BUILD_DIR:-$ROOT/_build_release}"
          STAGE_DIR="${STAGE_DIR:-$ROOT/_pkg_stage}"
          BUNDLE_DIR="${BUNDLE_DIR:-$ROOT/OpenMW-XBOX-UI}"
          OUT_TAR="${OUT_TAR:-$ROOT/OpenMW-XBOX-UI-linux-${ARCH_OUT}-${DATE}_${{ github.run_number }}.tar.xz}"
          XZ_LEVEL="${XZ_LEVEL:-9}"
          XZ_EXTREME="${XZ_EXTREME:-0}"

          die(){ echo "ERROR: $*" >&2; exit 1; }
          have(){ command -v "$1" >/dev/null 2>&1; }

          arch_tag() {
            case "$(uname -m)" in
              x86_64|amd64) echo "x86_64" ;;
              aarch64|arm64) echo "aarch64" ;;
              *) echo "$(uname -m)" ;;
            esac
          }

          resolve_multiarch() {
            local ma=""
            if have dpkg-architecture; then
              ma="$(dpkg-architecture -qDEB_HOST_MULTIARCH 2>/dev/null || true)"
            fi
            if [ -z "$ma" ]; then
              case "$(arch_tag)" in
                x86_64) ma="x86_64-linux-gnu" ;;
                aarch64) ma="aarch64-linux-gnu" ;;
                *) ma="" ;;
              esac
            fi
            echo "$ma"
          }

          ARCH_TAG="${ARCH_TAG:-$(arch_tag)}"
          MULTIARCH="${MULTIARCH:-$(resolve_multiarch)}"
          LIB_MULTIARCH_DIR=""
          [ -n "$MULTIARCH" ] && [ -d "/usr/lib/$MULTIARCH" ] && LIB_MULTIARCH_DIR="/usr/lib/$MULTIARCH"

          [ -f "$ROOT/CMakeLists.txt" ] || die "Run from repo root (CMakeLists.txt missing)."
          have cmake  || die "cmake not found"
          have ninja  || die "ninja not found"
          have tar    || die "tar not found"
          have strip  || die "strip not found (install binutils)"
          have ldd    || die "ldd not found"
          have awk    || die "awk not found"
          have sed    || die "sed not found"
          have find   || die "find not found"
          have xargs  || die "xargs not found"
          have readlink || die "readlink not found"
          have ls || die "ls not found"

          mkdir -p "${CCACHE_DIR}"
          if have ccache; then
            ccache -z || true
            ccache -M "${CCACHE_SIZE}" || true
          fi

          echo "==> Configure"
          mkdir -p "$BUILD_DIR"
          declare -a CMAKE_OPTS=(
            -DCMAKE_BUILD_TYPE=Release
          )
          if have ccache; then
            CMAKE_OPTS+=(
              -DCMAKE_C_COMPILER_LAUNCHER=ccache
              -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
            )
          fi
          cmake -S "$ROOT" -B "$BUILD_DIR" -G Ninja "${CMAKE_OPTS[@]}"

          echo "==> Build"
          ninja -C "$BUILD_DIR"

          echo "==> Stage install"
          rm -rf "$STAGE_DIR"
          mkdir -p "$STAGE_DIR"
          DESTDIR="$STAGE_DIR" cmake --install "$BUILD_DIR"

          PREFIX=""
          if [ -d "$STAGE_DIR/usr/local" ]; then
            PREFIX="$STAGE_DIR/usr/local"
          elif [ -d "$STAGE_DIR/usr" ]; then
            PREFIX="$STAGE_DIR/usr"
          else
            find "$STAGE_DIR" -maxdepth 4 -print
            die "Couldn't find staged /usr or /usr/local"
          fi
          echo "==> Prefix: ${PREFIX#$STAGE_DIR}"

          echo "==> Bundle layout"
          rm -rf "$BUNDLE_DIR"
          mkdir -p "$BUNDLE_DIR"/{lib,resources,plugins,qt}

          BIN_SRC=""
          if [ -d "$PREFIX/games/bin" ]; then
            BIN_SRC="$PREFIX/games/bin"
          elif [ -d "$PREFIX/bin" ]; then
            BIN_SRC="$PREFIX/bin"
          else
            find "$PREFIX" -maxdepth 3 -type d -print
            die "Couldn't find staged binaries"
          fi
          cp -a "$BIN_SRC/"* "$BUNDLE_DIR/"

          pushd "$BUNDLE_DIR" >/dev/null
          [ -f ./openmw ] && mv ./openmw "./OpenMW.${ARCH_TAG}"
          [ -f ./openmw-launcher ] && mv ./openmw-launcher "./OpenMW-Launcher.${ARCH_TAG}"
          chmod +x "./OpenMW.${ARCH_TAG}" "./OpenMW-Launcher.${ARCH_TAG}" 2>/dev/null || true
          popd >/dev/null

          RES_SRC=""
          if [ -d "$PREFIX/share/games/openmw/resources" ]; then
            RES_SRC="$PREFIX/share/games/openmw/resources"
          elif [ -d "$PREFIX/share/openmw/resources" ]; then
            RES_SRC="$PREFIX/share/openmw/resources"
          fi
          [ -n "$RES_SRC" ] || die "Couldn't find staged resources"
          cp -a "$RES_SRC/"* "$BUNDLE_DIR/resources/"

          copy_named_from_stage() {
            local name="$1"
            local src=""
            src="$(find "$STAGE_DIR" -type f -name "$name" -print -quit 2>/dev/null || true)"
            if [ -n "$src" ]; then
              echo "==> Copy $name"
              cp -a "$src" "$BUNDLE_DIR/"
            else
              echo "WARN: $name not found in stage"
            fi
          }
          copy_named_from_stage "defaults.bin"
          copy_named_from_stage "defaults-cs.bin"
          copy_named_from_stage "gamecontrollerdb.txt"
          [ -f "$BUNDLE_DIR/defaults.bin" ] || die "defaults.bin missing in bundle root"

          [ -n "$MULTIARCH" ] && [ -d "$PREFIX/lib/$MULTIARCH/openmw" ] && cp -a "$PREFIX/lib/$MULTIARCH/openmw/"* "$BUNDLE_DIR/plugins/" || true
          [ -d "$PREFIX/lib/openmw" ] && cp -a "$PREFIX/lib/openmw/"* "$BUNDLE_DIR/plugins/" || true

          QT_PLUGINS_SRC=""
          for d in \
            "${LIB_MULTIARCH_DIR:+$LIB_MULTIARCH_DIR/qt6/plugins}" \
            /usr/lib/qt6/plugins; do
            if [ -d "$d/platforms" ]; then QT_PLUGINS_SRC="$d"; break; fi
          done
          if [ -n "$QT_PLUGINS_SRC" ]; then
            mkdir -p "$BUNDLE_DIR/qt/plugins"
            cp -a "$QT_PLUGINS_SRC/platforms" "$BUNDLE_DIR/qt/plugins/"
            [ -d "$QT_PLUGINS_SRC/wayland-shell-integration" ] && cp -a "$QT_PLUGINS_SRC/wayland-shell-integration" "$BUNDLE_DIR/qt/plugins/" || true
            [ -d "$QT_PLUGINS_SRC/wayland-graphics-integration-client" ] && cp -a "$QT_PLUGINS_SRC/wayland-graphics-integration-client" "$BUNDLE_DIR/qt/plugins/" || true
            [ -d "$QT_PLUGINS_SRC/wayland-decoration-client" ] && cp -a "$QT_PLUGINS_SRC/wayland-decoration-client" "$BUNDLE_DIR/qt/plugins/" || true
          else
            echo "WARN: Qt6 plugins dir not found"
          fi

          OSG_PLUGINS_SRC=""
          for base in \
            "${LIB_MULTIARCH_DIR:-}" \
            /usr/lib; do
            [ -n "$base" ] || continue
            p="$(ls -d "$base"/osgPlugins-* 2>/dev/null | head -n 1 || true)"
            if [ -n "$p" ] && [ -d "$p" ]; then OSG_PLUGINS_SRC="$p"; break; fi
          done
          if [ -n "$OSG_PLUGINS_SRC" ]; then
            cp -a "$OSG_PLUGINS_SRC" "$BUNDLE_DIR/"
          else
            echo "WARN: osgPlugins-* not found"
          fi

          STAGED_CFG="$(find "$STAGE_DIR" -type f -name 'openmw.cfg' -print -quit 2>/dev/null || true)"
          [ -n "$STAGED_CFG" ] || die "Couldn't find staged openmw.cfg"
          cp -a "$STAGED_CFG" "$BUNDLE_DIR/openmw.cfg"

          sed -i \
            -e 's|^config=.*|config=?userconfig?|' \
            -e 's|^user-data=.*|user-data=?userdata?|' \
            -e 's|^data-local=.*|data-local=?userdata?data|' \
            -e 's|^resources=.*|resources=./resources|' \
            -e 's|/usr/local/share/games/openmw/resources|./resources|g' \
            -e 's|/usr/share/games/openmw/resources|./resources|g' \
            "$BUNDLE_DIR/openmw.cfg"

          grep -q '^data=\\./resources/vfs-mw$' "$BUNDLE_DIR/openmw.cfg" || echo 'data=./resources/vfs-mw' >> "$BUNDLE_DIR/openmw.cfg"

          pushd "$BUNDLE_DIR" >/dev/null

          skip_lib() {
            case "$1" in
              */ld-linux*|*/libc.so*|*/libm.so*|*/libpthread.so*|*/libdl.so*|*/librt.so*) return 0 ;;
            esac
            return 1
          }

          copy_dep() {
            local dep="$1"
            [ -n "$dep" ] || return 0
            [ -e "$dep" ] || return 0
            cp -aL "$dep" ./lib/ 2>/dev/null || true
            local real
            real="$(readlink -f "$dep" 2>/dev/null || true)"
            [ -n "$real" ] && [ -f "$real" ] && cp -aL "$real" ./lib/ 2>/dev/null || true
          }

          deps_tmp="$(mktemp)"
          ldd "./OpenMW.${ARCH_TAG}" | awk '/=> \\//{print $3} /^\\//{print $1}' >> "$deps_tmp" || true
          ldd "./OpenMW-Launcher.${ARCH_TAG}" | awk '/=> \\//{print $3} /^\\//{print $1}' >> "$deps_tmp" || true

          if [ -d ./qt/plugins/platforms ]; then
            find ./qt/plugins/platforms -type f -name '*.so' -print0 \
              | xargs -0 -I{} sh -c "ldd '{}' | awk '/=> \\\\/|^\\\\//{print \\$3==\"\"?\\$1:\\$3}'" \
              >> "$deps_tmp" || true
          fi

          if ls -d ./osgPlugins-* >/dev/null 2>&1; then
            find ./osgPlugins-* -type f -name '*.so' -print0 \
              | xargs -0 -I{} sh -c "ldd '{}' | awk '/=> \\\\/|^\\\\//{print \\$3==\"\"?\\$1:\\$3}'" \
              >> "$deps_tmp" || true
          fi

          sort -u "$deps_tmp" | while read -r dep; do
            [ -n "$dep" ] || continue
            skip_lib "$dep" && continue
            copy_dep "$dep"
          done
          rm -f "$deps_tmp"

          for f in \
            "${LIB_MULTIARCH_DIR:+$LIB_MULTIARCH_DIR/libavcodec.so.60}" \
            "${LIB_MULTIARCH_DIR:+$LIB_MULTIARCH_DIR/libavformat.so.60}" \
            "${LIB_MULTIARCH_DIR:+$LIB_MULTIARCH_DIR/libavutil.so.58}" \
            "${LIB_MULTIARCH_DIR:+$LIB_MULTIARCH_DIR/libswscale.so.7}" \
            "${LIB_MULTIARCH_DIR:+$LIB_MULTIARCH_DIR/libswresample.so.4}"; do
            [ -e "$f" ] && copy_dep "$f"
          done

          for f in \
            "${LIB_MULTIARCH_DIR:+$LIB_MULTIARCH_DIR/libcurl.so.4}" \
            "${LIB_MULTIARCH_DIR:+$LIB_MULTIARCH_DIR/libnghttp2.so.*}" \
            "${LIB_MULTIARCH_DIR:+$LIB_MULTIARCH_DIR/libidn2.so.*}" \
            "${LIB_MULTIARCH_DIR:+$LIB_MULTIARCH_DIR/libpsl.so.*}" \
            "${LIB_MULTIARCH_DIR:+$LIB_MULTIARCH_DIR/libz.so.*}" \
            "${LIB_MULTIARCH_DIR:+$LIB_MULTIARCH_DIR/libbrotlidec.so.*}" \
            "${LIB_MULTIARCH_DIR:+$LIB_MULTIARCH_DIR/libbrotlicommon.so.*}" \
            "${LIB_MULTIARCH_DIR:+$LIB_MULTIARCH_DIR/libssl.so.3}" \
            "${LIB_MULTIARCH_DIR:+$LIB_MULTIARCH_DIR/libcrypto.so.3}"; do
            [ -e "$f" ] && copy_dep "$f"
          done

          for f in "${LIB_MULTIARCH_DIR:+$LIB_MULTIARCH_DIR/libunshield.so.0}"; do
            [ -e "$f" ] && copy_dep "$f"
          done

          while IFS= read -r link; do
            real="$(readlink -f "$link" 2>/dev/null || true)"
            [ -n "$real" ] && [ -f "$real" ] || continue
            rm -f "$link" 2>/dev/null || true
            cp -aL "$real" "$link" 2>/dev/null || true
          done < <(find ./lib -type l)

          cat > ./openmw <<'EOW'
          #!/bin/sh
          set -eu

          readlink_sh() {
            path=$1
            if [ -L "$path" ]; then
              ls -l "$path" | sed 's/^.*-> //'
            else
              return 1
            fi
          }

          SCRIPT="$0"
          COUNT=0
          while [ -L "$SCRIPT" ]; do
            SCRIPT=$(readlink_sh "$SCRIPT")
            COUNT=$(expr "$COUNT" + 1)
            [ "$COUNT" -le 100 ] || { echo "Too many symbolic links"; exit 1; }
          done

          GAMEDIR=$(dirname "$SCRIPT")
          cd "$GAMEDIR" || { echo "Failed to enter $GAMEDIR"; exit 1; }

          export LD_LIBRARY_PATH="$GAMEDIR/lib:${LD_LIBRARY_PATH:-}"
          export XDG_CONFIG_HOME="${XDG_CONFIG_HOME:-$HOME/.config}"
          export XDG_DATA_HOME="${XDG_DATA_HOME:-$HOME/.local/share}"

          arch_tag() {
            case "$(uname -m)" in
              x86_64|amd64) echo "x86_64" ;;
              aarch64|arm64) echo "aarch64" ;;
              *) echo "$(uname -m)" ;;
            esac
          }

          BIN="$GAMEDIR/OpenMW.$(arch_tag)"
          if [ ! -x "$BIN" ]; then
            for cand in "$GAMEDIR/OpenMW.aarch64" "$GAMEDIR/OpenMW.x86_64" "$GAMEDIR"/OpenMW.*; do
              [ -x "$cand" ] && BIN="$cand" && break
            done
          fi

          exec "$BIN" --resources "$GAMEDIR/resources" "$@"
          EOW
          chmod +x ./openmw

          cat > ./OpenMW-Launcher <<'EOW'
          #!/bin/sh
          set -eu

          readlink_sh() {
            path=$1
            if [ -L "$path" ]; then
              ls -l "$path" | sed 's/^.*-> //'
            else
              return 1
            fi
          }

          SCRIPT="$0"
          COUNT=0
          while [ -L "$SCRIPT" ]; do
            SCRIPT=$(readlink_sh "$SCRIPT")
            COUNT=$(expr "$COUNT" + 1)
            [ "$COUNT" -le 100 ] || { echo "Too many symbolic links"; exit 1; }
          done

          GAMEDIR=$(dirname "$SCRIPT")
          cd "$GAMEDIR" || { echo "Failed to enter $GAMEDIR"; exit 1; }

          export LD_LIBRARY_PATH="$GAMEDIR/lib:${LD_LIBRARY_PATH:-}"
          export XDG_CONFIG_HOME="${XDG_CONFIG_HOME:-$HOME/.config}"
          export XDG_DATA_HOME="${XDG_DATA_HOME:-$HOME/.local/share}"

          export QT_PLUGIN_PATH="$GAMEDIR/qt/plugins"
          export QT_QPA_PLATFORM_PLUGIN_PATH="$GAMEDIR/qt/plugins/platforms"
          export OSG_LIBRARY_PATH="$GAMEDIR"

          arch_tag() {
            case "$(uname -m)" in
              x86_64|amd64) echo "x86_64" ;;
              aarch64|arm64) echo "aarch64" ;;
              *) echo "$(uname -m)" ;;
            esac
          }

          BIN="$GAMEDIR/OpenMW-Launcher.$(arch_tag)"
          if [ ! -x "$BIN" ]; then
            for cand in "$GAMEDIR/OpenMW-Launcher.aarch64" "$GAMEDIR/OpenMW-Launcher.x86_64" "$GAMEDIR"/OpenMW-Launcher.*; do
              [ -x "$cand" ] && BIN="$cand" && break
            done
          fi

          exec "$BIN" --resources "$GAMEDIR/resources" "$@"
          EOW
          chmod +x ./OpenMW-Launcher

          echo "==> Strip"
          strip --strip-unneeded "./OpenMW.${ARCH_TAG}" "./OpenMW-Launcher.${ARCH_TAG}" 2>/dev/null || true
          find ./lib -type f -name '*.so*' -exec strip --strip-unneeded {} + 2>/dev/null || true
          find ./qt -type f -name '*.so' -exec strip --strip-unneeded {} + 2>/dev/null || true
          find . -maxdepth 1 -type d -name 'osgPlugins-*' -print0 2>/dev/null \
            | xargs -0 -I{} find "{}" -type f -name '*.so' -exec strip --strip-unneeded {} + 2>/dev/null || true

          popd >/dev/null

          echo "==> Tarball: $OUT_TAR"
          rm -f "$OUT_TAR"
          XZ_OPT="-$XZ_LEVEL"
          [ "$XZ_EXTREME" = "1" ] && XZ_OPT="$XZ_OPT -e"
          export XZ_OPT
          tar -cJf "$OUT_TAR" -C "$ROOT" "$(basename "$BUNDLE_DIR")"
          echo "DONE: $OUT_TAR"

          if have ccache; then
            ccache -sv || true
          fi

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: OpenMW-XBOX-Linux-${{ matrix.arch_out }}
          path: src/OpenMW-XBOX-UI-linux-${{ matrix.arch_out }}-*.tar.xz
